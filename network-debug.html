<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>DUELL — Network Debug</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
  body { background: #0a0a0f; color: #f0ede8; font-family: monospace; padding: 20px; }
  button { background: #f0c030; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; }
  #log { background: #14141f; border: 1px solid rgba(255,255,255,.1); padding: 16px; margin-top: 20px; min-height: 200px; white-space: pre-wrap; font-size: 13px; line-height: 1.8; }
  #code-display { font-size: 48px; color: #f0c030; letter-spacing: .3em; margin: 10px 0; min-height: 60px; }
  input { background: #14141f; border: 1px solid rgba(255,255,255,.2); color: #f0ede8; padding: 10px; font-size: 20px; letter-spacing: .2em; width: 160px; text-transform: uppercase; }
  .ok  { color: #2af0a0; }
  .err { color: #f55a3a; }
  .inf { color: #3ab4f5; }
</style>
</head>
<body>
<h2>DUELL — PeerJS Verbindungstest v4</h2>

<div>
  <button onclick="startHost()">🟢 HOST starten</button>
  <div id="code-display"></div>
</div>

<hr style="border-color:#333;margin:20px 0">

<div>
  <input id="guest-code" placeholder="W-XXXX" maxlength="6">
  <button onclick="startGuest()">🔵 GUEST verbinden</button>
</div>

<div id="log">Bereit.\n</div>

<script src="network.js"></script>
<script>
// Console-Output auch ins UI spiegeln
var origLog   = console.log.bind(console);
var origWarn  = console.warn.bind(console);
var origError = console.error.bind(console);
console.log   = function() { origLog.apply(null,arguments);   log('inf', Array.from(arguments).join(' ')); };
console.warn  = function() { origWarn.apply(null,arguments);  log('inf', '⚠ ' + Array.from(arguments).join(' ')); };
console.error = function() { origError.apply(null,arguments); log('err', '❌ ' + Array.from(arguments).join(' ')); };

function log(cls, msg) {
  var el = document.getElementById('log');
  var ts = new Date().toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  var span = document.createElement('span');
  span.className = cls || '';
  span.textContent = '[' + ts + '] ' + msg + '\n';
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

function startHost() {
  log('ok', 'HOST: Erstelle Lobby (Online-Modus)…');
  Network.setMode('online');

  Network.onConnected(function(m) {
    log('ok', 'HOST: ✅ Guest verbunden! Name: ' + m.name);
    Network.send('__ack', { host: 'DebugHost', p2: m.name });
    log('ok', 'HOST: __ack gesendet.');
  });

  var code = Network.createLobby('DebugHost');
  document.getElementById('code-display').textContent = code;
  log('ok', 'HOST: Code = ' + code + ' — warte auf Guest…');
}

function startGuest() {
  var code = document.getElementById('guest-code').value.trim().toUpperCase();
  if (!code) { log('err', 'Bitte Code eingeben!'); return; }
  log('ok', 'GUEST: Verbinde mit Code: ' + code);

  Network.on('__ack', function(m) {
    Network.off('__ack');
    log('ok', 'GUEST: ✅ __ack empfangen! Host: ' + m.host);
    log('ok', 'GUEST: 🎉 Verbindung vollständig!');
  });

  Network.joinLobby(code, 'DebugGuest');
  log('inf', 'GUEST: joinLobby() gestartet, warte auf PeerJS open…');
}
</script>
</body>
</html>
